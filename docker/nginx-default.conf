# Hugo static site + same-origin proxy for ACS publisher thumbnails (CORP-safe).
# Used by the repo Dockerfile. For host nginx only, copy the location /_acs_proxy/
# block into your server that serves this site.
#
# Markdown for Agents: when Accept includes text/markdown, proxy to the bundled
# converter (see docker/markdown-server/). Copy the maps and @markdown_preference
# block from docker/nginx-markdown-negotiation.conf if you wire the converter yourself.

map $http_accept $markdown_pref {
    default 0;
    "~*text/markdown" 1;
}

# Do not send feeds, assets, etc. to the HTML→markdown converter.
map $uri $markdown_static_asset {
    default 0;
    ~*\.(xml|css|js|mjs|png|jpg|jpeg|gif|svg|webp|avif|ico|woff2?|ttf|eot|json|txt|pdf|map|webmanifest|atom)$ 1;
}

# Extensionless machine-readable paths (not Hugo HTML pages).
map $uri $markdown_non_html_path {
    default 0;
    ~*^/\.well-known/ 1;
    ~*^/(robots\.txt|llms\.txt|humans\.txt)$ 1;
}

map "$markdown_pref:$markdown_static_asset:$markdown_non_html_path" $markdown_route {
    default 0;
    "1:0:0" 1;
}

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # RFC 8288 / RFC 9727: machine-readable discovery for homepage (Link) and api-catalog (Linkset).
    set $homepage_link '</.well-known/api-catalog>; rel="api-catalog", </.well-known/openapi.yaml>; rel="service-desc", </feeds/>; rel="service-doc", </index.json>; rel="describedby"; type="application/json"';

    location = /.well-known/api-catalog {
        types {}
        default_type 'application/linkset+json; profile="https://www.rfc-editor.org/info/rfc9727"';
        alias /usr/share/nginx/html/.well-known/api-catalog;
        add_header Vary "Accept" always;
    }

    # try_files serves index.html in this location (URI stays /); Link/Vary apply to this response.
    location = / {
        if ($markdown_route = 1) {
            rewrite ^ @markdown_preference last;
        }
        try_files /index.html =404;
        # Homepage is served here (not location = /index.html); Link must be on this response (RFC 8288).
        add_header Link $homepage_link always;
        add_header Vary "Accept" always;
    }

    location = /index.html {
        if ($markdown_route = 1) {
            rewrite ^ @markdown_preference last;
        }
        add_header Link $homepage_link always;
        add_header Vary "Accept" always;
    }

    # Rewrite in data/papers.json: https://pubs.acs.org/cms/... → /_acs_proxy/cms/...
    location /_acs_proxy/ {
        proxy_pass              https://pubs.acs.org/;
        proxy_ssl_server_name   on;
        proxy_http_version      1.1;
        proxy_set_header        Host pubs.acs.org;
        proxy_set_header        User-Agent "Mozilla/5.0 (compatible; jhell-image-proxy/1)";
        proxy_set_header        Accept "image/avif,image/webp,image/apng,image/*,*/*;q=0.8";
        proxy_hide_header       Cross-Origin-Resource-Policy;
        proxy_hide_header       Cross-Origin-Embedder-Policy;
        proxy_connect_timeout   15s;
        proxy_read_timeout      60s;
    }

    location / {
        if ($markdown_route = 1) {
            rewrite ^ @markdown_preference last;
        }
        try_files $uri $uri/ =404;
    }

    location @markdown_preference {
        proxy_pass http://127.0.0.1:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Let caches distinguish HTML vs markdown negotiation (RFC 7231).
    add_header Vary "Accept" always;

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
