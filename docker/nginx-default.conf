# Hugo static site + same-origin proxy for ACS publisher thumbnails (CORP-safe).
# Used by the repo Dockerfile. For host nginx only, copy the location /_acs_proxy/
# block into your server that serves this site.

server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root   /usr/share/nginx/html;
    index  index.html;

    # Rewrite in data/papers.json: https://pubs.acs.org/cms/... → /_acs_proxy/cms/...
    location /_acs_proxy/ {
        proxy_pass              https://pubs.acs.org/;
        proxy_ssl_server_name   on;
        proxy_http_version      1.1;
        proxy_set_header        Host pubs.acs.org;
        proxy_set_header        User-Agent "Mozilla/5.0 (compatible; jhell-image-proxy/1)";
        proxy_set_header        Accept "image/avif,image/webp,image/apng,image/*,*/*;q=0.8";
        proxy_hide_header       Cross-Origin-Resource-Policy;
        proxy_hide_header       Cross-Origin-Embedder-Policy;
        proxy_connect_timeout   15s;
        proxy_read_timeout      60s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
